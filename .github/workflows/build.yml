name: Build

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
          - os: windows-latest
            label: windows-x64
          - os: macos-latest
            label: macos-aarch64
          - os: macos-13
            label: macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build fat jar
        run: ./gradlew build shadowJar

      - name: Upload fat jar
        uses: actions/upload-artifact@v4
        with:
          name: EotSC-jar-${{ matrix.label }}
          path: build/libs/EotSC-*.jar

      # ----- native packages (no Java needed on the user's machine) -----

      - name: jpackage (macOS)
        if: runner.os == 'macOS'
        run: |
          JAR=$(basename build/libs/EotSC-*.jar)
          jpackage --type app-image --name EotSC \
            --input build/libs --main-jar "$JAR" --main-class menumain.MenuMain \
            --dest dist
          # the launcher menu runs on stdin, so the app must start inside a terminal:
          # ship a double-clickable .command next to the app bundle
          cat > "dist/EotSC starten.command" <<'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          exec "./EotSC.app/Contents/MacOS/EotSC"
          EOF
          chmod +x "dist/EotSC starten.command"
          cd dist && zip -r -y "../EotSC-${{ matrix.label }}.zip" .

      - name: jpackage (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          JAR=$(basename build/libs/EotSC-*.jar)
          jpackage --type msi --name EotSC \
            --input build/libs --main-jar "$JAR" --main-class menumain.MenuMain \
            --win-console --win-menu --win-shortcut --dest dist
          mv dist/*.msi "EotSC-${{ matrix.label }}.msi"

      - name: jpackage (Linux)
        if: runner.os == 'Linux'
        run: |
          JAR=$(basename build/libs/EotSC-*.jar)
          jpackage --type app-image --name EotSC \
            --input build/libs --main-jar "$JAR" --main-class menumain.MenuMain \
            --dest dist
          cat > dist/eotsc.sh <<'EOF'
          #!/bin/sh
          cd "$(dirname "$0")"
          exec ./EotSC/bin/EotSC
          EOF
          chmod +x dist/eotsc.sh
          tar -C dist -czf "EotSC-${{ matrix.label }}.tar.gz" .

      - name: Upload native package
        uses: actions/upload-artifact@v4
        with:
          name: EotSC-app-${{ matrix.label }}
          path: |
            EotSC-*.zip
            EotSC-*.msi
            EotSC-*.tar.gz
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/EotSC-*.zip
            artifacts/EotSC-*.msi
            artifacts/EotSC-*.tar.gz
            artifacts/EotSC-*.jar
          generate_release_notes: true
